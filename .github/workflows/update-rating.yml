name: Update MedReviews Rating

on:
  schedule:
    # Runs daily at 06:00 UTC (09:00 Israel time)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-rating:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and update rating
        run: node scripts/update-rating.mjs

      - name: Commit and push if changed
        run: |
          git diff --quiet lib/config/site-config.ts && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/config/site-config.ts
          git commit -m "chore: update MedReviews rating data"
          git push
